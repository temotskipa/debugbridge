name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-mod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Fabric 1.21.11 mod
        working-directory: mod
        run: ./gradlew :fabric-1.21.11:build --no-daemon

      - name: Upload 1.21.11 artifact
        uses: actions/upload-artifact@v4
        with:
          name: debugbridge-1.21.11
          path: mod/fabric-1.21.11/build/libs/*.jar
          if-no-files-found: error

  build-mcp-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build
        working-directory: mcp-server
        run: npm run build

      - name: Upload MCP server
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server
          path: |
            mcp-server/dist/
            mcp-server/package.json
          if-no-files-found: error
